name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      # The e2e runner uses `next start` (production mode). Force mock auth so
      # the suite does not require a live Supabase project, and provide the
      # session secret that production mode requires.
      FAICER_AUTH_MODE: mock
      APP_SESSION_SECRET: ci-placeholder-session-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            .playwright-results/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

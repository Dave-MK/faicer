<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>AI Ledger Brand Preview</title>
<style>
:root {
  --ai-bg: #071120;
  --ai-bg-deep: #040B16;
  --ai-surface: #0B172A;
  --ai-surface-raised: #101F36;
  --ai-surface-soft: #13243D;
  --ai-surface-hover: #172B49;
  --ai-border: #203552;
  --ai-border-strong: #2A4B73;
  --ai-text: #FFFFFF;
  --ai-text-secondary: #A7B6CD;
  --ai-text-muted: #6F829E;
  --ai-cyan: #00D4FF;
  --ai-blue: #0099FF;
  --ai-indigo: #4C68FF;
  --ai-violet: #7A38FF;
  --ai-purple: #A854FF;
  --ai-success: #24D17E;
  --ai-warning: #FFB020;
  --ai-danger: #FF5A63;
  --ai-info: #3B82F6;
  --ai-gradient: linear-gradient(135deg, #00D4FF 0%, #0099FF 28%, #4C68FF 56%, #7A38FF 78%, #A854FF 100%);
  --ai-gradient-button: linear-gradient(135deg, #0099FF 0%, #4C68FF 55%, #7A38FF 100%);
  --ai-radius-sm: 8px;
  --ai-radius-md: 12px;
  --ai-radius-lg: 16px;
  --ai-shadow-panel: 0 12px 36px rgba(0,0,0,.24);
  --ai-shadow-glow: 0 0 28px rgba(0,212,255,.18);
}

[data-theme="dark-app"] {
  color-scheme: dark;
  --page-bg: var(--ai-bg);
  --panel-bg: var(--ai-surface);
  --panel-raised: var(--ai-surface-raised);
  --panel-border: var(--ai-border);
  --copy: var(--ai-text);
  --copy-secondary: var(--ai-text-secondary);
}

[data-theme="light-surface"] {
  color-scheme: light;
  --page-bg: #F4F8FD;
  --panel-bg: #FFFFFF;
  --panel-raised: #EEF4FB;
  --panel-border: #D8E3F0;
  --copy: #142033;
  --copy-secondary: #52657D;
}

[data-theme="report-print"] {
  color-scheme: light;
  --page-bg: #FFFFFF;
  --panel-bg: #FFFFFF;
  --panel-raised: #F7FAFE;
  --panel-border: #D6DFEB;
  --copy: #142033;
  --copy-secondary: #52657D;
}

.ai-panel {
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  border-radius: var(--ai-radius-md);
  box-shadow: var(--ai-shadow-panel);
}

.ai-primary-button {
  background: var(--ai-gradient-button);
  color: #FFFFFF;
  border: 0;
  border-radius: var(--ai-radius-sm);
  font-weight: 700;
  padding: .75rem 1rem;
}

.ai-focus-ring:focus-visible {
  outline: 0;
  box-shadow: 0 0 0 3px rgba(76,104,255,.32);
}

@import url("./../styles/fonts.css");
*{box-sizing:border-box}
body{margin:0;background:#071120;color:#fff;font-family:"Plus Jakarta Sans",Inter,Arial,sans-serif}
.wrap{max-width:1200px;margin:auto;padding:40px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center}
.hero img{width:100%;max-width:560px}
.panel{background:#0B172A;border:1px solid #203552;border-radius:16px;padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:24px}
.swatch{height:88px;border-radius:12px;border:1px solid #203552;padding:12px;display:flex;align-items:end;font-size:12px}
h1{font-size:52px;margin:0 0 12px}p{color:#A7B6CD;line-height:1.65}
button{background:linear-gradient(135deg,#0099FF,#4C68FF,#7A38FF);color:#fff;border:0;border-radius:8px;padding:12px 18px;font-weight:700}
@media(max-width:800px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>AI Ledger</h1>
      <p>Governance. Evidence. Trust.</p>
      <p>Locked identity preview for the AI-governance workspace.</p>
      <button>Primary action</button>
    </div>
    <div class="panel">
      <img src="../assets/logo/svg/ai-ledger-lockup-gradient.svg" alt="AI Ledger">
    </div>
  </div>
  <div class="grid">
    <div class="swatch" style="background:#071120">#071120 Background</div>
    <div class="swatch" style="background:#0B172A">#0B172A Surface</div>
    <div class="swatch" style="background:#00D4FF;color:#071120">#00D4FF Cyan</div>
    <div class="swatch" style="background:#0099FF">#0099FF Blue</div>
    <div class="swatch" style="background:#4C68FF">#4C68FF Indigo</div>
    <div class="swatch" style="background:#7A38FF">#7A38FF Violet</div>
    <div class="swatch" style="background:#A854FF">#A854FF Purple</div>
    <div class="swatch" style="background:#24D17E;color:#071120">#24D17E Success</div>
  </div>
</div>
</body>
</html>
